name: release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The CLI (psdns) is CGO-free and cross-compiles anywhere, but the Wails GUI
# (psdns-gui) needs a native build per OS, so each archive is produced on a
# matching runner. Every archive bundles both binaries; the two ARM targets ship
# CLI-only for now (no standard Wails build path). A final job collects all
# archives, writes one checksums file, and publishes the release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release and upload assets

env:
  WAILS_VERSION: v2.12.0

jobs:
  checks:
    name: version sync + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify Wails version is in sync (release.yml / README / go.mod)
        shell: bash
        run: |
          set -euo pipefail
          readme=$(grep -oE 'wails/v2/cmd/wails@v[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1 | sed 's/.*@//')
          gomod=$(grep -oE 'wailsapp/wails/v2 v[0-9]+\.[0-9]+\.[0-9]+' go.mod | head -1 | sed 's/.* v/v/')
          echo "release.yml=${WAILS_VERSION}  README=${readme}  go.mod=${gomod}"
          if [ "${WAILS_VERSION}" != "${readme}" ] || [ "${WAILS_VERSION}" != "${gomod}" ]; then
            echo "::error::Wails version mismatch — sync WAILS_VERSION, README (wails@…), and go.mod so all three match."
            exit 1
          fi
      - name: gofmt
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet (excluding GUI cgo packages)
        shell: bash
        run: go vet $(go list ./... | grep -vE '/(cmd/psdns-gui|internal/gui)$')
      - name: go test (excluding GUI cgo packages)
        shell: bash
        run: go test $(go list ./... | grep -vE '/(cmd/psdns-gui|internal/gui)$')

  build-gui:
    name: build ${{ matrix.label }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: macos,   os: macos-latest,   gui: darwin/universal, targets: darwin/amd64 darwin/arm64 }
          - { label: windows, os: windows-latest, gui: windows/amd64,    targets: windows/amd64 }
          - { label: linux,   os: ubuntu-latest,  gui: linux/amd64,      targets: linux/amd64 }
    runs-on: ${{ matrix.os }}
    # Apple Developer ID signing/notarization (macOS). All empty unless the repo
    # secrets are set; build-release.sh produces unsigned builds when they are, so
    # the release keeps working before an Apple Developer account is in place.
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git describe` works

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux WebKit + tray dependencies
        if: matrix.label == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Test (excluding GUI cgo packages)
        shell: bash
        run: go test $(go list ./... | grep -vE '/(cmd/psdns-gui|internal/gui)$')

      - name: Import Apple Developer ID certificate
        if: matrix.label == 'macos' && env.MACOS_SIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          # Prepend the signing keychain to the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build GUI + CLI and package
        shell: bash
        env:
          SKIP_CHECKSUMS: '1' # the release job writes one combined checksums file
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}" "${{ matrix.gui }}" ${{ matrix.targets }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-cli-arm:
    name: build cli-only (arm64)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build CLI-only ARM archives
        shell: bash
        env:
          SKIP_CHECKSUMS: '1'
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}" none windows/arm64 linux/arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-arm
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: [build-gui, build-cli-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Verify all 6 archives are present
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # macOS 2 (darwin amd64+arm64) + windows amd64 1 + linux amd64 1 + arm 2 = 6
          count=$(ls -1 psdns_*.tar.gz psdns_*.zip 2>/dev/null | wc -l | tr -d ' ')
          echo "found ${count} archives:"; ls -1 psdns_*.tar.gz psdns_*.zip || true
          if [ "${count}" != "6" ]; then
            echo "::error::expected 6 archives, found ${count} — a build runner likely failed; refusing to publish a partial release."
            exit 1
          fi

      - name: Generate combined checksums
        run: |
          cd dist
          shasum -a 256 psdns_*.tar.gz psdns_*.zip > "psdns_${GITHUB_REF_NAME}_checksums.txt"
          ls -1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v1.2.3-rc.1) are published as a
          # GitHub pre-release. /releases/latest excludes pre-releases, so the
          # test channel is never auto-offered to stable users; a plain vX.Y.Z
          # tag publishes a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/psdns_*.tar.gz
            dist/psdns_*.zip
            dist/psdns_*_checksums.txt
